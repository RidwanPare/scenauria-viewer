server {
    listen 4000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve supersplat.html (viewer iframe)
    location /supersplat {
        try_files /supersplat.html =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/wasm;
}
